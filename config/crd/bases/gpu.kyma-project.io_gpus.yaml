                  across GPU nodes.
                properties:
                  nodesReady:
                    description: nodesReady is the number of GPU nodes with healthy
                      NVIDIA drivers.
                    format: int32
                    type: integer
                  version:
                    description: version is the NVIDIA driver version reported by
                      the driver DaemonSet.
                    type: string
                type: object
              operatorVersion:
                description: operatorVersion is the installed NVIDIA GPU Operator
                  chart version.
                type: string
            type: object

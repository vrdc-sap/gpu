      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Gpu is the user-facing resource for managing GPU support in a Kyma cluster.
          One Gpu resource exists per cluster, named "gpu". It configures the NVIDIA
          GPU Operator and reports GPU health status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GpuSpec defines the desired state of the Gpu resource.
              Users can optionally override the driver version.
              All other configuration uses sensible defaults from the NVIDIA GPU Operator chart.
            properties:
              driver:
                description: driver allows optional override of the NVIDIA driver
                  configuration.
                properties:
                  version:
                    description: |-
                      version is the NVIDIA driver version to install (e.g., "535.129.03").
                      If empty, the default version from the GPU Operator chart is used.
                    type: string
                type: object
              timeSlicing:
                description: |-
                  timeSlicing enables GPU time-slicing. When absent, time-slicing is disabled
                  and workloads get exclusive GPU access.
                properties:
                  replicas:
                    description: replicas is the number of virtual GPU slices per
                      physical GPU (1–48).
                    format: int32
                    maximum: 48
                    minimum: 1
                    type: integer
                required:
                - replicas
                type: object
            type: object
          status:
            description: GpuStatus defines the observed state of the Gpu resource.
            properties:
              conditions:
                description: conditions represent the current state of the Gpu resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
